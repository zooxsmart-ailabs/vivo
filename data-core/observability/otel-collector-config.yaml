receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 10000
    send_batch_max_size: 11000

  resourcedetection:
    detectors: [env, system]
    timeout: 2s

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

exporters:
  clickhousetraces:
    datasource: tcp://signoz-clickhouse:9000/signoz_traces
    timeout: 10s

  clickhousemetrics:
    datasource: tcp://signoz-clickhouse:9000/signoz_metrics
    timeout: 10s

  clickhouselogs:
    datasource: tcp://signoz-clickhouse:9000/signoz_logs
    timeout: 10s

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [clickhousetraces]
    metrics:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [clickhousemetrics]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [clickhouselogs]
