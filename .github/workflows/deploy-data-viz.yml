name: Deploy data-viz to ZooxCloud

on:
  push:
    branches: [main]
    paths:
      - "data-viz/**"
      - ".github/workflows/deploy-data-viz.yml"
  workflow_dispatch:

concurrency:
  group: deploy-data-viz
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    environment: development
    defaults:
      run:
        working-directory: data-viz
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          DATABASE_HOST=${{ secrets.DATABASE_HOST }}
          DATABASE_PORT=${{ secrets.DATABASE_PORT }}
          DATABASE_USER=${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME=${{ secrets.DATABASE_NAME }}
          DATABASE_SSL=${{ secrets.DATABASE_SSL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          NODE_ENV=production
          NGINX_PORT=${{ secrets.NGINX_PORT }}
          REDIS_HOST=${{ secrets.REDIS_HOST }}
          REDIS_PORT=${{ secrets.REDIS_PORT }}
          NUXT_PUBLIC_API_BASE=${{ secrets.NUXT_PUBLIC_API_BASE }}
          NUXT_PUBLIC_WS_URL=${{ secrets.NUXT_PUBLIC_WS_URL }}
          EOF

      - name: Build and deploy containers
        run: docker compose up -d --build --remove-orphans

      - name: Health check
        run: |
          echo "Aguardando services..."
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:${{ secrets.NGINX_PORT }}/health" > /dev/null 2>&1; then
              echo "Health check OK"
              docker compose ps
              exit 0
            fi
            sleep 2
          done
          echo "Health check falhou"
          docker compose logs --tail=50
          exit 1

      - name: Cleanup old images
        if: success()
        run: docker image prune -f
