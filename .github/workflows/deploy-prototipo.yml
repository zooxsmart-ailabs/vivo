name: Deploy prototipo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "prototipo/**"
      - ".github/workflows/deploy-prototipo.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototipo
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: prototipo/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate static site
        env:
          NUXT_APP_BASE_URL: /${{ github.event.repository.name }}/
          NUXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NUXT_PUBLIC_AUTH_USER: ${{ secrets.NUXT_PUBLIC_AUTH_USER }}
          NUXT_PUBLIC_AUTH_PASS: ${{ secrets.NUXT_PUBLIC_AUTH_PASSWORD }}
        run: pnpm generate

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: prototipo/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
