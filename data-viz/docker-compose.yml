name: vivo-data-viz

services:
  nginx:
    container_name: vivo-dv-nginx
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
    networks:
      - vivo-net
    restart: unless-stopped

  api:
    container_name: vivo-dv-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - DATABASE_HOST=${DATABASE_HOST:-host.docker.internal}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USER=${DATABASE_USER:-vivo}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-changeme}
      - DATABASE_NAME=${DATABASE_NAME:-vivo_geointel}
      - DATABASE_SSL=${DATABASE_SSL:-false}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - PORT=3001
      - NODE_ENV=${NODE_ENV:-production}
      - CORS_ORIGINS=http://localhost,http://nginx
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-1h}
      - AUTH_USER=${AUTH_USER:-admin}
      - AUTH_PASS=${AUTH_PASS}
      - OTEL_SERVICE_NAME=vivo-api
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4317}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
    networks:
      - vivo-net
    restart: unless-stopped

  web:
    container_name: vivo-dv-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      - NUXT_PUBLIC_API_BASE=${NUXT_PUBLIC_API_BASE:-http://localhost/trpc}
      - NUXT_PUBLIC_WS_URL=${NUXT_PUBLIC_WS_URL:-ws://localhost}
      - NUXT_PUBLIC_GOOGLE_MAPS_KEY=${NUXT_PUBLIC_GOOGLE_MAPS_KEY:-}
    networks:
      - vivo-net
    restart: unless-stopped

  redis:
    container_name: vivo-dv-redis
    profiles: ["redis"]
    image: redis:8-alpine
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-}"
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - vivo-net
    restart: unless-stopped

volumes:
  redis-data:

networks:
  vivo-net:
    name: vivo-network
